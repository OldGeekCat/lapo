# LAPo Stage 1: Oracle Endpoint + Direct Decoder
# 核心转变: latent prediction → action-space loss
#   obs_t → encoder → z_t
#   obs_{t+H} → encoder(no_grad) → e_t (oracle, detached)
#   cond = [z_t, e_t, e_t-z_t] → DirectDecoder → action chunk
#   loss = action loss (xyz + rot6d + gripper BCE + smooth + endpoint_disp)
#
# 不再有 delta loss / freeze_zt / SIGReg / VICReg — action loss 无膨胀捷径。

policy: lapo
strategy: lapo

dataset:
  repo_id: openarm/openarm_pick_place_green277_ee6d
  root: /home/gacii/lr-home/datasets/openarm/openarm_pick_place_green277_ee6d
  task_instruction: null
  state_key: observation.state
  action_key: action
  image_key: observation.images.overhead
  rename_map:
    observation.images.overhead: observation.images.image2
    observation.images.wrist_right: observation.images.image3
  val_ratio: 0.1

policy_overrides:
  base_model: lerobot/xvla-base
  action_mode: ee6d
  max_action_dim: 32
  empty_cameras: 1
  dtype: float32
  horizon: 30                    # H=30 帧 = 1秒
  cond_dim: 512
  decoder_hidden: 512
  # action loss 权重
  w_xyz: 1.0
  w_rot: 1.0
  w_grip: 2.0
  w_smooth: 0.05
  w_endpoint_disp: 0.5

training:
  num_steps: 20000
  save_every: 2500
  val_every: 500
  log_every: 10
  batch_size: 64                 # action loss 轻量，拉大 batch
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.0001
  grad_clip_norm: 1.0            # master 建议 1.0（比 SB 的 10 严格）
  grad_accumulation_steps: 1     # batch 够大，不需要累积
  adam_beta1: 0.9
  adam_beta2: 0.95
  seed: 42
  device: cuda:0
  dtype: float32
  scheduler_warmup_steps: 1000
  scheduler_decay_steps: 20000
  scheduler_decay_lr: 0.0000025
  ddp: true
  fsdp: false
  grad_checkpoint: false
  cooldown_temp: 85
  resume_from: null
